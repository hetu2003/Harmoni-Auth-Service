spring.application.name=Auth

server.port=8081
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

server.servlet.context-path=/auth

# MySQL Database Configuration (Adjust 'db_name', 'username', 'password')
spring.datasource.url=jdbc:postgresql://localhost:5432/HarmoniEventManagement
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Redis Configuration (Assumes Redis is running on default 6379)
#spring.data.redis.host=localhost
#spring.data.redis.port=6379

# Swagger/OpenAPI (For testing your APIs later)
springdoc.api-docs.path=/api-docs
